# Application
spring.application.name=smart-campus-backend
server.port=8087

# ─── Database (PostgreSQL) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/smartcampus
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── AWS S3 (Your Module) ────────────────────────────────────────────────────
aws.s3.bucket=horizonia-campus-assets-himandidini-901602271249-ap-south-1-an
aws.s3.region=ap-south-1
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── OAuth2 & JWT (Module E) ─────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
jwt.secret=smartcampus-secret-key-for-development-only-change-in-production
jwt.expiration-ms=86400000

# ─── App & Logging ───────────────────────────────────────────────────────────
app.frontend-url=http://localhost:5173
logging.level.smartcampus=DEBUG
server.error.include-message=always