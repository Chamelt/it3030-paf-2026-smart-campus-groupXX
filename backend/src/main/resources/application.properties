spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/smartcampus
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AWS S3 (raw SDK v2)
aws.s3.bucket=horizonia-campus-assets-himandidini-901602271249-ap-south-1-an
aws.s3.region=ap-south-1
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}

# File upload limits (Prevents users from crashing server with huge files)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

server.port=8087
