# Application
spring.application.name=smart-campus-backend

# ─── Database (PostgreSQL) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/smartcampus
spring.datasource.username=postgres
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Logging (debug to find the 500) ─────────────────────────────────────────
logging.level.smartcampus=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Show full error details
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# ─── OAuth2 – Google ─────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Secret must be at least 32 characters for HS256; use a strong random value in production
jwt.secret=smartcampus-secret-key-for-development-only-change-in-production
jwt.expiration-ms=86400000

# ─── App ─────────────────────────────────────────────────────────────────────
app.frontend-url=http://localhost:5173

# ─── Server  ──────────────────────────────────────────────────────────────────
server.port=8081

